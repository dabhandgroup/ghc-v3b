<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Investor Login — GHC</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@100;200;300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0d0d;--bg2:#111;--text:#eeebe3;--muted:rgba(238,235,227,.62);--muted2:rgba(238,235,227,.36);--border:rgba(238,235,227,.1);--border2:rgba(238,235,227,.18);--ff:'Sora',sans-serif;--fb:'DM Sans',sans-serif;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.cursor,.cursor-ring{position:fixed;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);border-radius:50%;}
.cursor{width:7px;height:7px;background:var(--text);mix-blend-mode:difference;}
.cursor-ring{width:34px;height:34px;border:1px solid rgba(238,235,227,.4);z-index:99998;transition:width .3s,height .3s;mix-blend-mode:difference;}
.cursor-ring.h{width:52px;height:52px;opacity:.4;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.028;pointer-events:none;z-index:9998;}
.bg-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(238,235,227,.025) 0%,transparent 65%);pointer-events:none;}
.card{width:100%;max-width:420px;padding:0 28px;}
.card-logo{text-align:center;margin-bottom:48px;}
.card-logo svg{height:18px;}
.card-logo a{display:inline-block;}
.card h1{font-family:var(--ff);font-weight:200;font-size:30px;letter-spacing:-1.2px;margin-bottom:6px;text-align:center;}
.card-sub{font-size:13.5px;color:var(--muted);text-align:center;margin-bottom:36px;}
.fi-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;}
.fi-lbl{font-family:var(--ff);font-size:10px;font-weight:300;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;display:block;}
.fi{background:rgba(238,235,227,.04);border:1px solid rgba(238,235,227,.14);border-radius:2px;padding:14px 16px;font-family:var(--ff);font-size:13.5px;font-weight:300;color:var(--text);outline:none;transition:border-color .2s;width:100%;}
.fi::placeholder{color:rgba(238,235,227,.45);}
.fi:focus{border-color:rgba(238,235,227,.3);}
.forgot{font-family:var(--ff);font-size:11px;font-weight:300;color:var(--muted2);text-decoration:none;display:block;text-align:right;margin-top:4px;transition:color .2s;}
.forgot:hover{color:var(--muted);}
.btn{width:100%;padding:15px 28px;background:var(--text);color:var(--bg);border:none;border-radius:3px;font-family:var(--ff);font-size:12px;font-weight:400;letter-spacing:1px;cursor:none;transition:opacity .2s;margin-top:8px;}
.btn:hover{opacity:.82;}
.divider{display:flex;align-items:center;gap:14px;margin:24px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-family:var(--ff);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);}
.card-foot{text-align:center;margin-top:28px;}
.card-foot p{font-family:var(--ff);font-size:11.5px;font-weight:300;color:var(--muted2);}
.card-foot a{color:var(--muted);text-decoration:underline;cursor:none;transition:color .2s;}
.card-foot a:hover{color:var(--text);}
.lock-badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--ff);font-size:9px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);border:1px solid var(--border);padding:5px 14px;border-radius:20px;margin:0 auto 32px;display:flex;width:fit-content;}
.lock-badge svg{opacity:.6;}
.error{display:none;font-family:var(--ff);font-size:11.5px;color:rgba(248,113,113,.8);background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);border-radius:2px;padding:11px 14px;margin-bottom:12px;}
.error.show{display:block;}
</style>
</head>
<body>
<div class="cursor" id="cr"></div>
<div class="cursor-ring" id="crr"></div>
<div class="bg-glow"></div>

<div class="card">
  <div class="card-logo">
    <a href="index.html">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1893.8828 640.0001">
        <path d="M533.3042,394.3157h-239.9053v-148.6316h239.9053c7.4907,0,14.1826-4.6809,16.7505-11.718,2.5679-7.0361.4653-14.9277-5.2646-19.7522L301.8242,9.6092c-15.2139-12.8123-37.3003-12.8123-52.5132,0L14.5063,207.3414c-9.2192,7.7625-14.5063,19.1274-14.5063,31.1799v162.9573c0,12.0525,5.2871,23.4175,14.5054,31.1792l234.8052,197.7329c7.6079,6.407,16.9307,9.6101,26.2573,9.6094,9.3228-.001,18.6504-3.2041,26.2563-9.6094l242.9658-204.6045c5.73-4.8247,7.8325-12.7163,5.2646-19.7524-2.5679-7.0371-9.2598-11.718-16.7505-11.718ZM484.4478,210.0218h-191.0488V49.1373l191.0488,160.8845ZM257.7368,49.1378v160.884H66.6885L257.7368,49.1378ZM35.6626,245.6841h222.0742v148.6316H35.6626v-148.6316ZM66.6875,429.9781h191.0493v160.8848l-191.0493-160.8848ZM293.3989,590.8629v-160.8848h191.0488l-191.0488,160.8848Z" fill="var(--text)"/>
        <path d="M1417.0796,160h-25.5534c-7.4942,0-13.5904,6.0963-13.5904,13.5904v125.1195h-193.1423v-125.1195c0-7.4942-6.0963-13.5904-13.5904-13.5904h-25.5579c-7.4942,0-13.5904,6.0963-13.5904,13.5904v292.8191c0,7.4942,6.0963,13.5904,13.5904,13.5904h25.5579c7.4942,0,13.5904-6.0963,13.5904-13.5904v-126.6487h193.1423v126.6487c0,7.4942,6.0963,13.5904,13.5904,13.5904h25.5534c7.4942,0,13.5904-6.0963,13.5904-13.5904V173.5904c0-7.4942-6.0963-13.5904-13.5904-13.5904Z" fill="var(--text)"/>
        <path d="M1880.2923,201.0464c7.4942,0,13.5904-6.0963,13.5904-13.5904v-13.8655c0-7.4942-6.0963-13.5904-13.5904-13.5904h-217.58c-34.3061,0-62.4892,5.0816-83.7649,15.1036-62.2507,29.3041-67.0884,118.5088-67.0884,145.151,0,40.849,7.0154,96.2281,40.4354,128.0815,28.2358,26.9263,57.1209,31.664,107.3729,31.664h220.625c7.4942,0,13.5904-6.0963,13.5904-13.5904v-13.87c0-7.4942-6.0963-13.5904-13.5904-13.5904h-206.4013c-36.4713,0-62.9528-9.9604-78.7075-29.6042-15.4537-19.2588-22.9666-49.8992-22.9666-93.6726,0-40.4381,7.4879-68.9008,22.8916-87.0136,15.5886-18.3227,41.2402-27.6123,76.2431-27.6123h208.9407Z" fill="var(--text)"/>
        <path d="M1025.4929,160h-243.5023c-34.3061,0-62.4892,5.0816-83.7658,15.1036-62.2507,29.3041-67.0884,118.5088-67.0884,145.151,0,40.849,7.0154,96.2281,40.4354,128.0815,28.2367,26.9263,57.1218,31.664,107.3738,31.664h246.5473c7.4942,0,13.5904-6.0963,13.5904-13.5904v-155.1239c0-7.4942-6.0963-13.5904-13.5904-13.5904h-230.3165v41.0509h191.1727v100.203h-193.1798c-36.4722,0-62.9528-9.9604-78.7084-29.6042-15.4537-19.2597-22.9666-49.901-22.9666-93.6726,0-40.4354,7.4879-68.8981,22.8907-87.0136,15.5895-18.3227,41.2411-27.6123,76.244-27.6123h234.864c7.4942,0,13.5904-6.0963,13.5904-13.5904v-13.8655c0-7.4942-6.0963-13.5904-13.5904-13.5904Z" fill="var(--text)"/>
      </svg>
    </a>
  </div>

  <div class="lock-badge">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Investor Access
  </div>

  <h1>Welcome back.</h1>
  <p class="card-sub">Sign in to your GHC investor portal.</p>

  <div class="error" id="errMsg">Incorrect email or password. Please try again.</div>

  <div class="fi-wrap">
    <div>
      <label class="fi-lbl">Email address</label>
      <input class="fi" type="email" id="loginEmail" placeholder="you@fund.com" autocomplete="email"/>
    </div>
    <div>
      <label class="fi-lbl">Password</label>
      <input class="fi" type="password" id="loginPw" placeholder="••••••••" autocomplete="current-password"/>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
  </div>

  <button class="btn" onclick="doLogin()">Sign in</button>

  <div class="divider"><span>or</span></div>

  <div class="card-foot">
    <p>Don't have access yet? <a href="signup.html">Apply here →</a></p>
  </div>
</div>

<script>
const cr=document.getElementById('cr'),crr=document.getElementById('crr');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cr.style.left=mx+'px';cr.style.top=my+'px';});
(function aR(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;crr.style.left=rx+'px';crr.style.top=ry+'px';requestAnimationFrame(aR);})();
document.querySelectorAll('a,button,input').forEach(el=>{el.addEventListener('mouseenter',()=>crr.classList.add('h'));el.addEventListener('mouseleave',()=>crr.classList.remove('h'));});
function doLogin(){
  const e=document.getElementById('loginEmail').value;
  const p=document.getElementById('loginPw').value;
  if(!e||!p){document.getElementById('errMsg').classList.add('show');return;}
  // Demo: any email/password combo works for prototype
  if(e&&p){window.location.href='portal.html';}
  else{document.getElementById('errMsg').classList.add('show');}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
